<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarup Academy - Home</title>
    <style>
        /* Global styles */
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-color: #4285f4;
            color: white;
            padding: 15px 0;
            text-align: center;
        }
        header h1 {
            margin: 0;
        }
        header a {
            color: white;
            text-decoration: none;
        }
        nav ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        nav ul li {
            display: inline;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }
        section {
            padding: 40px;
            text-align: center;
        }
        section h2 {
            color: #4285f4;
        }
        footer {
            background-color: #f1f1f1;
            padding: 20px 0;
            text-align: center;
            font-family: 'Arial', sans-serif;
            color: #555;
            margin-top: 40px;
            border-top: 1px solid #ddd;
            position: relative;
        }
        footer p {
            margin: 0;
            font-size: 16px;
            font-weight: bold;
            animation: textAnimation 5s infinite;
        }
        @keyframes textAnimation {
            0% { color: #4285f4; }
            25% { color: #db4437; }
            50% { color: #f4b400; }
            75% { color: #0f9d58; }
            100% { color: #4285f4; }
        }
    </style>
</head>

            </ul>
        </nav>
    </header>
    <section>
        <h2>Welcome to Swarup Academy</h2>
        <p>Providing quality education with a focus on student development and academic growth. Join us and start your learning journey today!</p>
    </section>
    <footer>
        <hr>
        <p>Made with love by Swarup ❤️</p>
    </footer>
