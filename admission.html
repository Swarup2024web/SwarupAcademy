<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admission - Swarup Academy</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
    }

    body {
      background-color: #fff;
      color: #202124;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: #fff;
      padding: 20px 0;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    header h1 a {
      font-size: 28px;
      color: #1a73e8;
      text-decoration: none;
    }

    nav {
      background-color: #f8f9fa;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    nav ul li {
      margin: 0 15px;
    }

    nav ul li a {
      text-decoration: none;
      color: #1a73e8;
      font-size: 16px;
    }

    nav ul li a:hover {
      text-decoration: underline;
    }

    .main {
      padding: 40px 20px;
      flex: 1;
    }

    .form-container {
      max-width: 500px;
      margin: 0 auto;
      background-color: #fff;
      padding: 30px;
      border: 1px solid #dadce0;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(60, 64, 67, 0.15);
    }

    .form-container h2 {
      margin-bottom: 20px;
      font-size: 22px;
      color: #202124;
    }

    .form-container p {
      margin-bottom: 20px;
      font-size: 14px;
      color: #5f6368;
    }

    .form-container label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #3c4043;
      text-align: left;
    }

    .form-container input,
    .form-container select,
    .form-container textarea {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 20px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      font-size: 16px;
      transition: border 0.2s;
    }

    .form-container input:focus,
    .form-container select:focus,
    .form-container textarea:focus {
      outline: none;
      border: 2px solid #1a73e8;
    }

    .form-container button {
      background-color: #1a73e8;
      color: white;
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .form-container button:hover {
      background-color: #185abc;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 13px;
      color: #5f6368;
      border-top: 1px solid #e0e0e0;
      background-color: #f8f9fa;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="index.html">Swarup Academy</a></h1>
  </header>

  <nav>
    <ul>
      <li><a href="admission.html">Admission</a></li>
      <li><a href="scholarship.html">Scholarship</a></li>
      <li><a href="resources.html">Resources</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="main">
    <div class="form-container">
      <h2>Admission Form</h2>
      <p>Fill in the details to apply for admission:</p>
      <form action="mailto:bswarup1998@gmail.com" method="post" enctype="multipart/form-data">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" autocomplete="name" required />

        <label for="class">Class:</label>
        <input type="text" id="class" name="class" required />

        <label for="subjects">Subjects:</label>
        <select id="subjects" name="subjects" required>
          <option value="All-Subjects">All Subjects</option>
          <option value="English">English</option>
          <option value="Mathematics">Mathematics</option>
        </select>

        <label for="contact">Contact:</label>
        <input type="tel" id="contact" name="contact" pattern="[0-9]{10}" placeholder="e.g. 9876543210" required />

        <label for="description">Description:</label>
        <textarea id="description" name="description" rows="4" required></textarea>

        <button type="submit">Submit</button>
      </form>
    </div>
  </div>

  <footer>
    <p>Made with care by Swarup &mdash; 2025</p>
  </footer>
</body>
</html>
