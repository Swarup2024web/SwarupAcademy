<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission - Swarup Academy</title>
    <style>
        /* Reset styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body Styles */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 36px;
        }

        /* Navigation */
        nav {
            background-color: #34495e;
            padding: 10px;
        }

        nav ul {
            list-style: none;
            text-align: center;
        }

        nav ul li {
            display: inline;
            margin: 0 15px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        nav ul li a:hover {
            text-decoration: underline;
        }

        /* Main Section */
        .main {
            padding: 50px 20px;
            text-align: center;
        }

        /* Form Styling */
        .form-container {
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 8px;
        }

        .form-container h2 {
            margin-bottom: 20px;
        }

        .form-container label {
            font-size: 18px;
            display: block;
            margin-bottom: 10px;
            text-align: left;
        }

        .form-container input, .form-container select, .form-container textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .form-container textarea {
            resize: vertical;
        }

        .form-container button {
            background-color: #27ae60;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }

        .form-container button:hover {
            background-color: #2ecc71;
        }

        /* Footer */
        footer {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            margin-top: auto;
        }

        footer p {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Swarup Academy</h1>
    </header>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="admission.html">Admission</a></li>
            <li><a href="scholarship.html">Scholarship</a></li>
            <li><a href="resources.html">Resources</a></li>
            <li><a href="contact.html">Contact Me</a></li>
        </ul>
    </nav>

    <!-- Admission Form -->
    <div class="main">
        <div class="form-container">
            <h2>Admission Form</h2>
            <p>To get admission to my classes, fill in the following form:</p>
            <form action="mailto:bswarup1998@gmail.com" method="post" enctype="multipart/form-data">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="class">Class:</label>
                <input type="text" id="class" name="class" required>

                <label for="subjects">Subjects:</label>
                <select id="subjects" name="subjects" required>
                    <option value="English">English</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="All-Subjects">All Subjects</option>
                </select>

                <label for="contact">Contact:</label>
                <input type="text" id="contact" name="contact" required>

                <label for="description">Description:</label>
                <textarea id="description" name="description" rows="4" required></textarea>

                <button type="submit">Submit</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>Made with love by Swarup ❤️</p>
    </footer>
</body>
</html>
