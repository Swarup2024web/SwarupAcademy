<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarup Academy - Contact</title>
    <style>
        /* Same global styles as index.html */
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-color: #4285f4;
            color: white;
            padding: 15px 0;
            text-align: center;
        }
        header h1 {
            margin: 0;
        }
        header a {
            color: white;
            text-decoration: none;
        }
        nav ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        nav ul li {
            display: inline;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }
        section {
            padding: 40px;
            text-align: center;
        }
        section h2 {
            color: #4285f4;
        }
        footer {
            background-color: #f1f1f1;
            padding: 20px 0;
            text-align: center;
            font-family: 'Arial', sans-serif;
            color: #555;
            margin-top: 40px;
            border-top: 1px solid #ddd;
            position: relative;
        }
        footer p {
            margin: 0;
            font-size: 16px;
            font-weight: bold;
            animation: textAnimation 5s infinite;
        }
        @keyframes textAnimation {
            0% { color: #4285f4; }
            25% { color: #db4437; }
            50% { color: #f4b400; }
            75% { color: #0f9d58; }
            100% { color: #4285f4; }
        }
        form {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        form input, form textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        form button {
            background-color: #4285f4;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        form button:hover {
            background-color: #357ae8;
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="index.html">Swarup Academy</a></h1>
        <nav>
            <ul>
                <li><a href="admission.html">Admission</a></li>
                <li><a href="scholarship.html">Scholarship</a></li>
                <li><a href="resources.html">Resources</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section>
        <h2>Contact Us</h2>
        <p>If you have any questions or need further information, feel free to reach out to us. We'd love to hear from you!</p>
        <form action="mailto:youremail@example.com" method="POST" enctype="multipart/form-data">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" required>
            
            <label for="email">Your Email</label>
            <input type="email" id="email" name="email" required>
            
            <label for="message">Your Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            
            <button type="submit">Send Message</button>
        </form>
    </section>
    <footer>
        <hr>
        <p>Made with love by Swarup ❤️</p>
    </footer>
</body>
</html>
