<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Swarup Academy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 a {
            color: white;
            text-decoration: none;
            font-size: 36px;
        }

        nav {
            background-color: #34495e;
            padding: 10px;
        }

        nav ul {
            list-style: none;
            text-align: center;
        }

        nav ul li {
            display: inline;
            margin: 0 15px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        nav ul li a:hover {
            text-decoration: underline;
        }

        .main {
            padding: 50px 20px;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 0 auto;
            max-width: 500px;
            text-align: left;
        }

        form label {
            font-size: 18px;
            font-weight: bold;
        }

        form input,
        form textarea {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        form textarea {
            resize: vertical;
            min-height: 100px;
        }

        form input[type="file"] {
            padding: 5px;
        }

        form button {
            padding: 10px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
        }

        form button:hover {
            background-color: #34495e;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            margin-top: auto;
        }

        footer p {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <h1><a href="index.html">Swarup Academy</a></h1>
    </header>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="admission.html">Admission</a></li>
            <li><a href="scholarship.html">Scholarship</a></li>
            <li><a href="resources.html">Resources</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Section -->
    <div class="main">
        <h2>Contact</h2>
        <p>If you have any problems, suggestions, or feedback, please fill out the form below. I'll get back to you as soon as possible.</p>
        <form action="mailto:bswarup1998@gmail.com" method="post" enctype="multipart/form-data">
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="problem">Problem or Suggestion:</label>
            <textarea id="problem" name="problem" required></textarea>

            <label for="file">Upload File (if any):</label>
            <input type="file" id="file" name="file" accept=".jpg,.jpeg,.png,.pdf,.doc,.docx">

            <button type="submit">Submit</button>
        </form>
    </div>

    <!-- Footer -->
    <footer>
        <p>Made with love by Swarup Sir ❤️</p>
    </footer>
</body>
</html>
